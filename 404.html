<!DOCTYPE html>
<!--
  404-pagina · 2026-06-11 — St. Hubert Horse & Country Club (EWVO)
  Dennengroen vlak met zelftekenend wapenschild, drietalig (volgt bewaarde taalkeuze),
  reduced motion gerespecteerd. Links werken zowel op GitHub Pages (projectpad) als op een eigen domein.
-->
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1c2b22">
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%231c2b22'/%3E%3Cg stroke='%23f4f1e9' fill='none' stroke-width='4'%3E%3Cpath d='M24 16 H96 Q103 16 103 23 V62 C103 80 87 89 60 101 C33 89 17 80 17 62 V23 Q17 16 24 16 Z'/%3E%3Cpath d='M43.5 71 A20.5 20.5 0 1 1 76.5 71' stroke-width='4.5'/%3E%3Cpath d='M49.5 66.5 A13 13 0 1 1 70.5 66.5' stroke-width='4.5'/%3E%3Cpath d='M43.5 71 L49.5 66.5 M76.5 71 L70.5 66.5'/%3E%3C/g%3E%3C/svg%3E">
<title>Pagina niet gevonden — St. Hubert Horse &amp; Country Club</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --groen:#1c2b22;--groen-diep:#152119;--ivoor:#f4f1e9;
  --messing:#b9985f;--cognac:#8a5a33;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;
  background:var(--groen-diep);color:var(--ivoor);
  display:flex;align-items:center;justify-content:center;text-align:center;
  font-size:17px;line-height:1.7;-webkit-font-smoothing:antialiased;padding:40px 6vw;
}
a{color:inherit;text-decoration:none}
.kader{max-width:560px}
.zegel{width:clamp(120px,16vw,170px);color:var(--ivoor);margin:0 auto 34px;overflow:visible}
.zegel .pl-p{fill:none;stroke:currentColor;stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:1;animation:teken .75s cubic-bezier(.45,0,.2,1) var(--d,0s) both}
.zegel .pl-dot{opacity:0;animation:fade .45s ease .65s both}
.zegel .pl-t{opacity:0;animation:fade .45s ease .75s both}
@keyframes teken{to{stroke-dashoffset:0}}
@keyframes fade{to{opacity:1}}
.eyebrow{
  font-size:12px;letter-spacing:.34em;text-transform:uppercase;font-weight:500;color:var(--messing);
  display:flex;align-items:center;justify-content:center;gap:14px;
  opacity:0;animation:fade .8s ease .9s both;
}
.eyebrow::before,.eyebrow::after{content:'';width:34px;height:1px;background:var(--messing)}
h1{font-family:'Marcellus',serif;font-weight:400;font-size:clamp(72px,12vw,120px);line-height:1;margin:18px 0 6px;opacity:0;animation:fade .8s ease 1s both}
.lede{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(19px,2.4vw,24px);color:rgba(244,241,233,.85);max-width:24em;margin:0 auto;opacity:0;animation:fade .8s ease 1.1s both}
.cta-row{display:flex;gap:18px;justify-content:center;margin-top:38px;flex-wrap:wrap;opacity:0;animation:fade .8s ease 1.25s both}
.btn{
  display:inline-block;font-size:13px;letter-spacing:.22em;text-transform:uppercase;font-weight:500;
  padding:15px 32px;border:1px solid var(--messing);color:var(--ivoor);white-space:nowrap;
  transition:background .35s,color .35s,border-color .35s;
}
.btn:hover{background:var(--messing);color:var(--groen-diep)}
.btn.solid{background:var(--messing);color:var(--groen-diep)}
.btn.solid:hover{background:var(--ivoor);border-color:var(--ivoor)}
::selection{background:var(--ivoor);color:var(--groen)}
:focus-visible{outline:2px solid var(--messing);outline-offset:3px}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
  .zegel .pl-p{stroke-dashoffset:0}
  .zegel .pl-dot,.zegel .pl-t,.eyebrow,h1,.lede,.cta-row{opacity:1}
}
</style>
</head>
<body>

<main class="kader">
  <svg class="zegel" viewBox="0 0 120 120" fill="none" stroke="currentColor" stroke-linecap="round" aria-hidden="true">
    <path class="pl-p" d="M18 12 H102 Q110 12 110 20 V68 C110 88 92 98 60 112 C28 98 10 88 10 68 V20 Q10 12 18 12 Z" stroke-width="1.6" pathLength="1"/>
    <path class="pl-p" d="M20.5 16 H99.5 Q106 16 106 22.5 V67 C106 84.5 90 94 60 107.5 C30 94 14 84.5 14 67 V22.5 Q14 16 20.5 16 Z" stroke-width=".7" pathLength="1" style="--d:.1s"/>
    <g stroke-width="1.1">
      <rect class="pl-p" x="-11" y="-3" width="22" height="6" rx="3" transform="translate(33.5,28.5) rotate(45)" pathLength="1" style="--d:.2s"/>
      <path class="pl-dot" d="M-6.5 -2.7 L-5.3 2.7 M-2.2 -2.8 L-1 2.8 M2.1 -2.8 L3.3 2.8 M6.4 -2.7 L7.6 2.7" stroke-width=".8" transform="translate(33.5,28.5) rotate(45)"/>
      <path class="pl-p" d="M41.3 36.3 L74.6 69.6" stroke-width="1.6" pathLength="1" style="--d:.3s"/>
      <rect class="pl-p" x="-5.5" y="-1.7" width="11" height="3.4" rx="1.7" transform="translate(78.5,73.5) rotate(45)" pathLength="1" style="--d:.4s"/>
      <ellipse class="pl-p" cx="9.5" cy="0" rx="3.6" ry="1.7" transform="translate(78.5,73.5) rotate(45)" pathLength="1" style="--d:.45s"/>
    </g>
    <g stroke-width="1.1">
      <rect class="pl-p" x="-11" y="-3" width="22" height="6" rx="3" transform="translate(86.5,28.5) rotate(-45)" pathLength="1" style="--d:.2s"/>
      <path class="pl-dot" d="M-6.5 -2.7 L-5.3 2.7 M-2.2 -2.8 L-1 2.8 M2.1 -2.8 L3.3 2.8 M6.4 -2.7 L7.6 2.7" stroke-width=".8" transform="translate(86.5,28.5) rotate(-45)"/>
      <path class="pl-p" d="M78.7 36.3 L45.4 69.6" stroke-width="1.6" pathLength="1" style="--d:.3s"/>
      <rect class="pl-p" x="-5.5" y="-1.7" width="11" height="3.4" rx="1.7" transform="translate(41.5,73.5) rotate(135)" pathLength="1" style="--d:.4s"/>
      <ellipse class="pl-p" cx="9.5" cy="0" rx="3.6" ry="1.7" transform="translate(41.5,73.5) rotate(135)" pathLength="1" style="--d:.45s"/>
    </g>
    <g stroke-width="1.5">
      <path class="pl-p" d="M47.8 65 A15.5 15.5 0 1 1 72.2 65" pathLength="1" style="--d:.35s"/>
      <path class="pl-p" d="M52.1 61.7 A10 10 0 1 1 67.9 61.7" pathLength="1" style="--d:.45s"/>
      <path class="pl-p" d="M47.8 65 L52.1 61.7 M72.2 65 L67.9 61.7" stroke-width="1.1" pathLength="1" style="--d:.55s"/>
    </g>
    <g fill="currentColor" stroke="none" class="pl-t">
      <text x="60" y="25" text-anchor="middle" font-family="Jost, sans-serif" font-weight="400" font-size="5.4" letter-spacing=".8" textLength="52" lengthAdjust="spacingAndGlyphs">HORSE &amp; COUNTRYCLUB</text>
      <text x="60" y="94" text-anchor="middle" font-family="Marcellus, serif" font-size="13.5" textLength="64" lengthAdjust="spacingAndGlyphs">ST. HUBERT</text>
      <text x="60" y="101.5" text-anchor="middle" font-family="Jost, sans-serif" font-weight="400" font-size="4.4" letter-spacing=".8" textLength="30" lengthAdjust="spacingAndGlyphs">SINCE 1920</text>
    </g>
  </svg>

  <div class="eyebrow" data-i18n="nf-eye">Verdwaald op het domein</div>
  <h1>404</h1>
  <p class="lede" data-i18n="nf-lede">De pagina die u zoekt bestaat niet of is verplaatst.</p>
  <div class="cta-row">
    <a href="/" class="btn solid huis" data-i18n="nf-home">Terug naar home</a>
    <a href="/historie" class="btn hist" data-i18n="nf-hist">Onze historie</a>
  </div>
</main>

<script>
/* paden: werkt op eigen domein én op GitHub Pages-projectpad */
(function(){
  const basis = location.pathname.indexOf('/sinthubert.com') === 0 ? '/sinthubert.com/' : '/';
  document.querySelector('.huis').href = basis;
  document.querySelector('.hist').href = basis + 'historie.html';
})();

/* drietalig — volgt de bewaarde taalkeuze van de site */
const i18n = {
  nl:{'nf-eye':"Verdwaald op het domein",'nf-lede':"De pagina die u zoekt bestaat niet of is verplaatst.",'nf-home':"Terug naar home",'nf-hist':"Onze historie",'pg-title':"Pagina niet gevonden — St. Hubert Horse & Country Club"},
  fr:{'nf-eye':"Égaré sur le domaine",'nf-lede':"La page que vous cherchez n'existe pas ou a été déplacée.",'nf-home':"Retour à l'accueil",'nf-hist':"Notre histoire",'pg-title':"Page introuvable — St. Hubert Horse & Country Club"},
  en:{'nf-eye':"Lost on the estate",'nf-lede':"The page you are looking for does not exist or has been moved.",'nf-home':"Back to home",'nf-hist':"Our history",'pg-title':"Page not found — St. Hubert Horse & Country Club"}
};
try{
  const taal = localStorage.getItem('sh-lang');
  if(taal && taal !== 'nl' && i18n[taal]){
    const t = i18n[taal];
    document.querySelectorAll('[data-i18n]').forEach(el=>{ const k=el.dataset.i18n; if(t[k]) el.textContent=t[k]; });
    document.title = t['pg-title'];
    document.documentElement.lang = taal;
  }
}catch(e){}
</script>
</body>
</html>
